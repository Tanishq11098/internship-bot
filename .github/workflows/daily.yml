name: Daily Internship Bot

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST every day
  workflow_dispatch:         # lets you run it manually anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests beautifulsoup4

      - name: Run internship bot
        env:
          EMAIL:    ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python internship_bot.py

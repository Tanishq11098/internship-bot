name: Internship Bot v6.0

on:
  schedule:
    # Mon, Thu, Sat, Sun at 8:00 AM IST (2:30 AM UTC)
    - cron: "30 2 * * 1,4,6,0"
  workflow_dispatch:   # allows manual "Run workflow" from Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas beautifulsoup4 openpyxl gspread google-auth

      - name: Run Internship Bot
        # File name matches v6
        run: python internship_bot_v6.py
        env:
          # These must match your GitHub Secret names EXACTLY (case-sensitive)
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          # Optional: set EMAIL_TO secret if you want digest sent to a different address
          # EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v3
        with:
          name: internships-${{ github.run_number }}
          path: internships.xlsx
          if-no-files-found: warn
